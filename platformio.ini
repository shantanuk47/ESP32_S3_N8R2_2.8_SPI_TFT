;============================================================
; Project : ESP32-S3 N8R2 2.8" SPI TFT Display Stack
; Author  : Shantanu Kumar
; GitHub  : https://github.com/shantanuk47
;============================================================

[env:esp32s3_hw678]

platform = espressif32
board = rymcu-esp32-s3-devkitc-1
framework = espidf

monitor_speed = 115200
upload_speed = 921600

build_type = debug

;------------------------------------------------------------
; Automatic Firmware Version Generation
;------------------------------------------------------------
extra_scripts = pre:scripts/generate_version.py

;------------------------------------------------------------
; Compiler Warning Discipline
;------------------------------------------------------------
build_flags =
-Wall
-Wextra
-Werror
-Wshadow